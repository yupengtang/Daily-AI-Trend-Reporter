<script>
document.addEventListener('DOMContentLoaded', function () {

  // ── KaTeX math rendering ──
  if (typeof renderMathInElement === 'function') {
    renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false}
      ],
      throwOnError: false
    });
  }

  // ── Reading progress bar ──
  var progressBar = document.getElementById('reading-progress');
  if (progressBar && document.querySelector('.post')) {
    window.addEventListener('scroll', function () {
      var docHeight = document.documentElement.scrollHeight - window.innerHeight;
      var pct = docHeight > 0 ? (window.scrollY / docHeight) * 100 : 0;
      progressBar.style.width = pct + '%';
    });
  }

  // ── Card entrance animation ──
  if ('IntersectionObserver' in window) {
    var observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('in-view');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.05 });
    document.querySelectorAll('.post-card').forEach(function (card) {
      observer.observe(card);
    });
  }

  // ── RSS tooltip ──
  var rssBtn = document.getElementById('rss-btn');
  var rssTooltip = document.getElementById('rss-tooltip');
  if (rssBtn && rssTooltip) {
    rssBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      rssTooltip.classList.toggle('visible');
    });
    document.addEventListener('click', function (e) {
      if (!rssTooltip.contains(e.target) && e.target !== rssBtn) {
        rssTooltip.classList.remove('visible');
      }
    });
    var rssCopy = document.getElementById('rss-copy');
    var rssUrl = document.getElementById('rss-url');
    rssCopy.addEventListener('click', function () {
      rssUrl.select();
      navigator.clipboard.writeText(rssUrl.value).then(function () {
        rssCopy.textContent = 'Copied';
        setTimeout(function () { rssCopy.textContent = 'Copy'; }, 2000);
      });
    });
  }

  // ── Dark mode toggle ──
  var toggle = document.getElementById('theme-toggle');
  if (toggle) {
    toggle.addEventListener('click', function () {
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    });
  }

  // ── Copy button for code blocks ──
  document.querySelectorAll('div.highlight, figure.highlight').forEach(function (block) {
    var btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'Copy';
    btn.addEventListener('click', function () {
      var code = block.querySelector('code');
      var text = code ? code.innerText : block.innerText;
      navigator.clipboard.writeText(text).then(function () {
        btn.textContent = 'Copied';
        btn.classList.add('copied');
        setTimeout(function () { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    });
    block.style.position = 'relative';
    block.appendChild(btn);
  });

  // ── PDF download ──
  var pdfBtn = document.getElementById('download-pdf');
  if (pdfBtn) {
    pdfBtn.addEventListener('click', function (e) { e.preventDefault(); window.print(); });
  }

  // ── Back to top ──
  var topBtn = document.getElementById('back-to-top');
  if (topBtn) {
    window.addEventListener('scroll', function () {
      topBtn.classList.toggle('visible', window.scrollY > 400);
    });
    topBtn.addEventListener('click', function () {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }

  // ── Load more posts ──
  var loadBtn = document.getElementById('load-more');
  if (loadBtn) {
    loadBtn.addEventListener('click', function () {
      document.querySelectorAll('.post-hidden').forEach(function (el) { el.classList.remove('post-hidden'); });
      loadBtn.parentElement.remove();
    });
  }

  // ── Category filter tabs ──
  var filterTabs = document.getElementById('filter-tabs');
  if (filterTabs) {
    var postList = document.getElementById('post-list');
    var loadMoreWrap = document.getElementById('load-more-wrap');

    filterTabs.addEventListener('click', function (e) {
      var tab = e.target.closest('.filter-tab');
      if (!tab) return;

      filterTabs.querySelectorAll('.filter-tab').forEach(function (t) { t.classList.remove('active'); });
      tab.classList.add('active');

      var filter = tab.getAttribute('data-filter');
      var cards = postList.querySelectorAll('.post-card');
      var shown = 0;

      cards.forEach(function (card) {
        var cat = card.getAttribute('data-category') || 'daily';
        var match = filter === 'all' || cat === filter;
        card.style.display = match ? '' : 'none';
        if (match) {
          card.classList.remove('post-hidden');
          shown++;
        }
      });

      if (loadMoreWrap) loadMoreWrap.style.display = filter === 'all' ? '' : 'none';
    });
  }

  // ── Paper search ──
  var searchInput = document.getElementById('search-input');
  if (!searchInput) return;

  var searchResults = document.getElementById('search-results');
  var searchPostList = document.getElementById('post-list');
  var searchLoadMore = document.getElementById('load-more-wrap');
  var searchBox = document.getElementById('search-box');
  var clearBtn = document.getElementById('search-clear');
  var searchFilterTabs = document.getElementById('filter-tabs');
  var searchIndex = null;
  var debounceTimer = null;

  clearBtn.addEventListener('click', function () {
    searchInput.value = '';
    searchBox.classList.remove('has-query');
    searchResults.style.display = 'none';
    searchResults.innerHTML = '';
    searchPostList.style.display = '';
    if (searchLoadMore) searchLoadMore.style.display = '';
    if (searchFilterTabs) searchFilterTabs.style.display = '';
    searchInput.focus();
  });

  searchInput.addEventListener('focus', function () {
    if (searchIndex) return;
    var base = document.querySelector('.site-title').getAttribute('href');
    fetch(base + 'search.json').then(function (r) { return r.json(); }).then(function (d) { searchIndex = d; });
  });

  searchInput.addEventListener('input', function () {
    searchBox.classList.toggle('has-query', searchInput.value.trim().length > 0);
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(doSearch, 200);
  });

  function doSearch() {
    var query = searchInput.value.trim().toLowerCase();
    if (!query || query.length < 2) {
      searchResults.style.display = 'none';
      searchResults.innerHTML = '';
      searchPostList.style.display = '';
      if (searchLoadMore) searchLoadMore.style.display = '';
      if (searchFilterTabs) searchFilterTabs.style.display = '';
      return;
    }
    if (!searchIndex) return;

    var terms = query.split(/\s+/);
    var termRegexes = terms.map(function (t) {
      return new RegExp('\\b' + t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i');
    });
    var matches = searchIndex.filter(function (post) {
      var text = post.title + ' ' + post.content;
      return termRegexes.every(function (re) { return re.test(text); });
    });

    searchPostList.style.display = 'none';
    if (searchLoadMore) searchLoadMore.style.display = 'none';
    if (searchFilterTabs) searchFilterTabs.style.display = 'none';
    searchResults.style.display = '';

    if (matches.length === 0) {
      searchResults.innerHTML = '<p class="search-empty">No papers found for "' + query.replace(/</g, '&lt;') + '"</p>';
      return;
    }

    var html = '<p class="search-count">' + matches.length + ' result' + (matches.length === 1 ? '' : 's') + '</p>';
    matches.slice(0, 50).forEach(function (post) {
      var lines = post.content.split('\n');
      var snippets = [];
      lines.forEach(function (line) {
        if (termRegexes.some(function (re) { return re.test(line); }) && line.trim().length > 10) {
          var s = line.trim();
          if (s.length > 150) s = s.substring(0, 150) + '...';
          snippets.push(s);
        }
      });
      html += '<article class="post-card"><div class="post-card-meta"><time>' + post.date + '</time></div>';
      html += '<h2 class="post-card-title"><a href="' + post.url + '">' + post.title + '</a></h2>';
      if (snippets.length > 0) {
        html += '<div class="search-snippets">';
        snippets.slice(0, 3).forEach(function (s) {
          terms.forEach(function (t) {
            var re = new RegExp('\\b(' + t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
            s = s.replace(re, '<mark>$1</mark>');
          });
          html += '<p>' + s + '</p>';
        });
        html += '</div>';
      }
      html += '</article>';
    });
    if (matches.length > 50) html += '<p class="search-count">Showing first 50</p>';
    searchResults.innerHTML = html;
  }
});
</script>
