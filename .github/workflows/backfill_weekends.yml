name: Backfill Weekend Reports

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'What to generate'
        required: true
        default: 'sundays-remaining'
        type: choice
        options:
          - saturdays
          - sundays-remaining
          - both

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: pip install -r requirements.txt

      - name: Generate Sunday deep dives (remaining 7)
        if: ${{ inputs.type == 'sundays-remaining' || inputs.type == 'both' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          DATES=(2026-04-19 2026-04-26 2026-05-03 2026-05-10 2026-05-17 2026-05-24 2026-05-31)
          for d in "${DATES[@]}"; do
            echo "=== Sunday $d ==="
            python3 batch_generate.py --start "$d" --end "$d" || echo "Failed $d"
            sleep 10
          done

      - name: Generate all 20 Sundays (full)
        if: ${{ inputs.type == 'sundays-full' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          DATES=(
            2026-01-18 2026-01-25 2026-02-01
            2026-02-08 2026-02-15 2026-02-22 2026-03-01
            2026-03-08 2026-03-15 2026-03-22 2026-03-29
            2026-04-05 2026-04-12 2026-04-19 2026-04-26
            2026-05-03 2026-05-10 2026-05-17 2026-05-24 2026-05-31
          )
          for d in "${DATES[@]}"; do
            echo "=== Sunday $d ==="
            python3 batch_generate.py --start "$d" --end "$d" || echo "Failed $d"
            sleep 8
          done

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add _posts/
          if git diff --staged --quiet; then
            echo "No new files"
          else
            git commit -m "Backfill weekend reports"
            git pull --rebase origin main
            git push
          fi
