name: 🌱 Daily AI Frontier - Daily Generation

on:
  schedule:
    - cron: '0 14 * * *'  # Run daily at 14:00 UTC (7:00 AM PDT, 10:00 PM CST)
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD), leave empty for today'
        required: false
      end_date:
        description: 'End date (YYYY-MM-DD), leave empty for today'
        required: false

# Add permissions for the workflow
permissions:
  contents: write
  actions: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # Reduced timeout since we only generate once

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Check HF_TOKEN
        run: |
          if [ -z "${{ secrets.HF_TOKEN }}" ]; then
            echo "❌ HF_TOKEN is not set in repository secrets"
            exit 1
          else
            echo "✅ HF_TOKEN is configured"
          fi

      - name: Test API connection
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 test_api.py || echo "⚠️ API test failed, but continuing..."

      - name: Generate daily AI research digest
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "📝 Generating today's AI research digest..."
          START="${{ github.event.inputs.start_date }}"
          END="${{ github.event.inputs.end_date }}"
          if [ -n "$START" ] && [ -n "$END" ]; then
            python3 batch_generate.py --start "$START" --end "$END"
          else
            python3 batch_generate.py
          fi
          if [ $? -eq 0 ]; then
            echo "✅ Daily digest generated successfully"
          else
            echo "❌ Daily digest generation failed"
            exit 1
          fi

      - name: Check for generated files
        run: |
          echo "📁 Checking for generated files..."
          ls -la _posts/ || echo "No _posts directory found"
          find _posts/ -name "*.md" -newer .github/workflows/daily_blog.yml 2>/dev/null || echo "No new files found"

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Add all changes in _posts directory
          git add _posts/ || echo "No new posts to add"
          
          # Check if there are any changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # Get list of new files for commit message
            NEW_FILES=$(git diff --staged --name-only | grep "_posts/" | head -5)
            COMMIT_MSG="Auto-generated daily AI research digest"
            if [ ! -z "$NEW_FILES" ]; then
              COMMIT_MSG="Auto-generated: $(echo "$NEW_FILES" | tr '\n' ' ')"
            fi
            
            git commit -m "$COMMIT_MSG"
            echo "✅ Changes committed: $COMMIT_MSG"
            
            # Push changes
            git push
            echo "✅ Changes pushed to repository"
          fi

      - name: Verify deployment
        run: |
          echo "🔍 Verifying deployment..."
          echo "Generated files should now be available on the website"
          echo "Check the Actions tab for any errors"
